  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    font-size: 13px;
    color: var(--text2);

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    color: var(--text2);

  .status-dot {

    border-radius: 50%;
    background: var(--text3);
  }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;

    padding: 7px 20px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text2);
    background: none;
    border: none;
    transition: all .15s;

  .tab.active {
    background: var(--bg3);
    color: var(--text);
    border: 0.5px solid var(--border2);
  }

    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 0;
    overflow-x: auto;

    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 8px 2px 10px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    margin-bottom: -0.5px;
  }
  .snav-btn.active {
    color: var(--text);
    border-bottom-color: var(--green);
  }

  /* Sections */
  .section { display: none; }
  .section.active { display: block; }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .kpi {

    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }

    color: var(--text2);

    letter-spacing: .06em;
    margin-bottom: 6px;
  }

    font-weight: 600;
    letter-spacing: -.5px;
    color: var(--text);
  }

    color: var(--text3);

    gap: 14px;

function fmt(n) {

// ─── GOOGLE SHEETS FETCH ───────────────────────────────────────────────────

// Fetch a single GID sheet as raw CSV via the public export URL
async function fetchGID(gid) {
  const url = `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${gid}&single=true&output=csv`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status + ' gid=' + gid);
  return await res.text();
}

// Minimal CSV parser (handles quoted commas)
function parseCSV(text) {
  return text.trim().split('\n').map(line => {
    const cols = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

// Clean a cell value to a number (handles $ . , formatting)
function cleanNum(s) {
  if (!s) return 0;
  const n = parseFloat(String(s).replace(/[^0-9.\-]/g, ''));
  return isNaN(n) ? 0 : n;
}

// Find row index where col A matches keyword (case-insensitive partial)
function findRow(rows, keyword) {
  return rows.findIndex(r => r[0] && r[0].toLowerCase().includes(keyword.toLowerCase()));
}

// Extract 12 monthly values from a row starting at col index 1
function extractMonths(rows, keyword, numMonths) {
  const idx = findRow(rows, keyword);
  if (idx < 0) return Array(numMonths).fill(0);
  return Array.from({length: numMonths}, (_, i) => cleanNum(rows[idx][i + 1]));
}

async function fetchSheetData() {
  try {
    // Try fetching each GID and parse the one with the most data
    const allRows = {};
    for (const gid of SHEET_GIDS) {
      try {
        const csv = await fetchGID(gid);
        allRows[gid] = parseCSV(csv);
      } catch(e) { console.warn('GID', gid, 'failed:', e.message); }
    }

    // Use the GID that returned the most rows
    const bestGID = Object.keys(allRows).sort((a,b) => allRows[b].length - allRows[a].length)[0];
    if (!bestGID) throw new Error('No se pudo obtener ninguna pestaña');

    const rows = allRows[bestGID];
    parseRowsIntoData(rows);

    usingLive = true;
    const now = new Date();
    document.getElementById('lastUpdated').style.display = 'flex';
    document.getElementById('lastUpdatedText').textContent = 'Actualizado ' + now.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
    setStatus(true, 'Conectado con Sheets');
    return true;
  } catch(e) {
    console.warn('Sheet fetch error:', e);
    document.getElementById('configBanner').classList.add('show');
    document.getElementById('configBanner').innerHTML =
      '⚠️ No se pudo conectar con Google Sheets — mostrando snapshot estático. Error: ' + e.message +
      '<br><small>Verificá que el sheet esté publicado: Archivo → Publicar en la web.</small>';
    setStatus(false, 'Snapshot estático');
    return false;
  }
}

// Parse the raw rows CSV into DATA structure
// The sheet has 3 sections separated by blank rows: 2026, 2025, 2024
function parseRowsIntoData(rows) {
  // Find year section start rows by scanning for "Real" or year markers
  const sections = {};
  let currentYearSection = null;
  let sectionStart = {};

  for (let i = 0; i < rows.length; i++) {
    const cell = (rows[i][0] || '').trim();
    if (cell.includes('2026')) { currentYearSection = 2026; sectionStart[2026] = i; }
    else if (cell.includes('2025') && !cell.includes('Planeado')) { currentYearSection = 2025; sectionStart[2025] = i; }
    else if (cell.includes('2024')) { currentYearSection = 2024; sectionStart[2024] = i; }
  }

  // For each year, extract a slice of rows and parse
  const yearList = [2026, 2025, 2024];
  const yearKeys = Object.keys(sectionStart).map(Number).sort((a,b) => b-a);

  for (let yi = 0; yi < yearKeys.length; yi++) {
    const y = yearKeys[yi];
    const startRow = sectionStart[y];
    const endRow   = yi + 1 < yearKeys.length ? sectionStart[yearKeys[yi+1]] : rows.length;
    const slice    = rows.slice(startRow, endRow);

    // Detect months from header row (row after "Real")
    const headerIdx = slice.findIndex(r => r[0] && (r[0].trim() === 'Real' || r[0].trim().toLowerCase().includes('real')));
    if (headerIdx < 0) continue;
    const headerRow = slice[headerIdx];

    const MONTH_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const MONTH_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const meses = [];
    const colOffsets = [];
    for (let c = 1; c < headerRow.length; c++) {
      const v = (headerRow[c] || '').trim();
      const idx = MONTH_ES.findIndex(m => m.toLowerCase() === v.toLowerCase());
      if (idx >= 0) { meses.push(MONTH_SHORT[idx]); colOffsets.push(c); }
    }
    if (meses.length === 0) continue;

    const N = meses.length;

    function extractCols(keyword) {
      const ri = slice.findIndex(r => r[0] && r[0].toLowerCase().includes(keyword.toLowerCase()));
      if (ri < 0) return Array(N).fill(0);
      return colOffsets.map(c => cleanNum(slice[ri][c]));
    }

    // Client rows: everything between "Ingresos Operativos" and "Otros ingresos"
    const ingOpIdx  = slice.findIndex(r => r[0] && r[0].toLowerCase().includes('ingresos operativos'));
    const otrosIdx  = slice.findIndex(r => r[0] && r[0].toLowerCase().includes('otros ingresos'));
    const clientRows = (ingOpIdx >= 0 && otrosIdx > ingOpIdx)
      ? slice.slice(ingOpIdx + 1, otrosIdx).filter(r => r[0] && r[0].trim() !== '')
      : [];

    const clientes = {};
    const ingresoClientes = {};
    clientRows.forEach(r => {
      const name = r[0].trim();
      if (!name || name.toLowerCase().includes('total') || name.toLowerCase().includes('ingresos')) return;
      const vals = colOffsets.map(c => cleanNum(r[c]));
      clientes[name] = vals.map(v => v > 0 ? 1 : 0);
      ingresoClientes[name] = vals.reduce((a,b)=>a+b, 0);
    });

    // Salary rows: between "Costos Operativos" and "Resultado sin dividendos"
    const costOpIdx = slice.findIndex(r => r[0] && r[0].toLowerCase().includes('costos operativos'));
    const resSinDivIdx = slice.findIndex(r => r[0] && r[0].toLowerCase().includes('resultado sin dividendos'));
    const SALARY_KEYWORDS = ['account', 'perfo', 'redes', 'honorarios', 'contador'];
    const sueldos = {};
    if (costOpIdx >= 0 && resSinDivIdx > costOpIdx) {
      slice.slice(costOpIdx + 1, resSinDivIdx).forEach(r => {
        const name = (r[0] || '').trim();
        if (!name) return;
        const lname = name.toLowerCase();
        if (SALARY_KEYWORDS.some(k => lname.includes(k))) {
          sueldos[name] = colOffsets.map(c => cleanNum(r[c]));
        }
      });
    }

    // Dividend rows
    const dividendos = {};
    slice.forEach(r => {
      const name = (r[0] || '').trim();
      if (name.toLowerCase().startsWith('dividendos ')) {
        const socio = name.replace(/^dividendos\s+/i, '');
        dividendos[socio] = colOffsets.map(c => cleanNum(r[c]));
      }
    });

    DATA[y] = {
      meses,
      ingresos:  extractCols('ingresos operativos'),
      costos:    extractCols('costos operativos'),
      resultado: extractCols('resultado neto'),
      margen:    extractCols('margen neto').map(v => typeof v === 'number' && v < 1 && v > 0 ? Math.round(v * 100) : Math.round(v)),
      clientes,
      ingresoClientes,
      sueldos:   Object.keys(sueldos).length > 0 ? sueldos : FALLBACK[y].sueldos,
      dividendos: Object.keys(dividendos).length > 0 ? dividendos : FALLBACK[y].dividendos,
    };

    // If parsing gave mostly zeros, fall back to hardcoded
    if (sum(DATA[y].ingresos) === 0) {
      DATA[y] = JSON.parse(JSON.stringify(FALLBACK[y]));
    }
  }
}

// ─── HELPERS: LTV / MRR / CHURN ────────────────────────────────────────────
function calcClientMetrics(d) {
  const allClients = Object.keys(d.clientes);
  const metrics = {};

  allClients.forEach(c => {
    const presence = d.clientes[c];
    const activeMonths = presence.filter(v => v > 0).length;
    const totalRevenue = d.ingresoClientes[c] || 0;
    const avgMonthly   = activeMonths > 0 ? totalRevenue / activeMonths : 0;
    const ltv          = avgMonthly * activeMonths; // = totalRevenue, explicit formula
    const mrr          = avgMonthly;

    // First and last active month index
    const firstIdx = presence.findIndex(v => v > 0);
    const lastIdx  = presence.length - 1 - [...presence].reverse().findIndex(v => v > 0);
    const isActive = presence[presence.length - 1] > 0;

    // Churn month: first month where client went from active to inactive
    let churnMonth = null;
    for (let i = 1; i < presence.length; i++) {
      if (presence[i-1] > 0 && presence[i] === 0) {
        churnMonth = d.meses[i];
        break;
      }
    }

    metrics[c] = { activeMonths, totalRevenue, avgMonthly, ltv, mrr, isActive, firstIdx, lastIdx, churnMonth };
  });

  return metrics;
}

function calcChurnRate(d) {
  // Monthly churn rate = clients lost / clients at start of month
  const rates = [];
  const allClients = Object.keys(d.clientes);
  for (let i = 1; i < d.meses.length; i++) {
    const prevActive = allClients.filter(c => d.clientes[c][i-1] > 0).length;
    const lost       = allClients.filter(c => d.clientes[c][i-1] > 0 && d.clientes[c][i] === 0).length;
    rates.push(prevActive > 0 ? Math.round(lost / prevActive * 100) : 0);
  }
  return rates;
}

// ─── SECTION: CLIENTES ─────────────────────────────────────────────────────
function buildClientes() {
  const d = DATA[currentYear];
  const lastIdx   = d.meses.length - 1;
  const allClients = Object.keys(d.clientes);
  const metrics   = calcClientMetrics(d);
  const churnRates = calcChurnRate(d);

  const activeNow = allClients.filter(c => metrics[c].isActive);
  const churned   = allClients.filter(c => !metrics[c].isActive && metrics[c].activeMonths > 0);

  // KPIs
  const totalMRR    = activeNow.reduce((a,c) => a + metrics[c].mrr, 0);
  const totalLTV    = allClients.reduce((a,c) => a + metrics[c].ltv, 0);
  const avgLTV      = allClients.length > 0 ? totalLTV / allClients.length : 0;
  const avgChurn    = churnRates.length > 0 ? Math.round(churnRates.reduce((a,b)=>a+b,0) / churnRates.length) : 0;
  const avgLifespan = allClients.reduce((a,c) => a + metrics[c].activeMonths, 0) / (allClients.length || 1);

  // Client table rows — sorted by LTV desc
  const sortedClients = [...allClients].sort((a,b) => metrics[b].ltv - metrics[a].ltv);
  const tableRows = sortedClients.map((c, i) => {
    const m = metrics[c];
    const statusBadge = m.isActive
      ? `<span style="background:rgba(29,158,117,.15);color:#9FE1CB;border:0.5px solid rgba(29,158,117,.3);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500">Activo</span>`
      : `<span style="background:var(--bg3);color:var(--text3);border:0.5px solid var(--border);padding:2px 8px;border-radius:10px;font-size:11px">Baja ${m.churnMonth||''}</span>`;
    const ltvBar = `<div style="height:3px;background:var(--border);border-radius:2px;margin-top:4px"><div style="height:3px;background:${CLIENT_COLORS[i%CLIENT_COLORS.length]};border-radius:2px;width:${Math.round(m.ltv/sortedClients.reduce((a,cc)=>Math.max(a,metrics[cc].ltv),1)*100)}%"></div></div>`;
    return `
      <tr>
        <td><span style="color:${CLIENT_COLORS[i%CLIENT_COLORS.length]};font-weight:500">●</span> ${c}</td>
        <td>${statusBadge}</td>
        <td style="text-align:right">${m.activeMonths}m</td>
        <td style="text-align:right;color:var(--text)">${fmt(m.mrr)}</td>
        <td style="text-align:right;color:var(--text)">${fmt(m.ltv)}${ltvBar}</td>
        <td style="text-align:right;color:var(--text2)">${m.churnMonth ? m.churnMonth : '—'}</td>
      </tr>`;
  }).join('');

  // Churn events list
  const churnEvents = churned.map(c => {
    const m = metrics[c];
    return `<span class="chip ended">○ ${c} <span style="opacity:.6;font-weight:400">${m.churnMonth} · LTV ${fmt(m.ltv)}</span></span>`;
  }).join('');

  return `
    <div class="kpi-row" style="margin-bottom:20px">
      <div class="kpi">
        <div class="kpi-label">MRR total (activos)</div>
        <div class="kpi-val">${fmt(totalMRR)}</div>
        <div class="kpi-sub">${activeNow.length} clientes · promedio ${fmt(activeNow.length ? totalMRR/activeNow.length : 0)}/cliente</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">LTV promedio</div>
        <div class="kpi-val">${fmt(avgLTV)}</div>
        <div class="kpi-sub">Todos los clientes del año</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">LTV total acumulado</div>
        <div class="kpi-val">${fmt(totalLTV)}</div>
        <div class="kpi-sub">${allClients.length} clientes únicos</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Churn rate promedio</div>
        <div class="kpi-val">${avgChurn}%</div>
        <div class="kpi-sub">Mensual · ${churned.length} baja${churned.length!==1?'s':''}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Vida promedio</div>
        <div class="kpi-val">${avgLifespan.toFixed(1)}m</div>
        <div class="kpi-sub">Meses activos por cliente</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Tabla de clientes — LTV · MRR · Churn</div>
      <div style="overflow-x:auto">
        <table class="compare-table" style="min-width:560px">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Estado</th>
              <th style="text-align:right">Meses</th>

              <th style="text-align:right">Baja</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>

    <div class="grid-2" style="margin-bottom:14px">

        <div class="chips" style="margin-top:4px">${churned.length ? churnEvents : '<span style="color:var(--text3)">Sin bajas registradas</span>'}</div>
      </div>

        <div class="chart-wrap h${Math.max(140, allClients.length * 26)}"><canvas id="c-cli-heatmap" role="img" aria-label="Presencia mensual de cada cliente"></canvas></div>
      </div>
    </div>
  `;
}

// ─── CHART RENDERING ───────────────────────────────────────────────────────
function attachCharts() {
  const d = DATA[currentYear];

  if (currentSection === 'overview')    renderOverviewCharts(d);
  if (currentSection === 'interanual')  renderInteranualCharts();
  if (currentSection === 'clientes')    renderClientCharts(d);
  if (currentSection === 'costos')      renderCostCharts(d);
  if (currentSection === 'dividendos')  renderDivCharts(d);
  if (currentSection === 'acumulado')   renderAcumuladoCharts();
}

function mkChart(id, config) {
  const el = document.getElementById(id);
  if (!el) return;
  destroyChart(id);
  charts[id] = new Chart(el, config);
}

// Client charts
function renderClientCharts(d) {
  const metrics    = calcClientMetrics(d);
  const churnRates = calcChurnRate(d);
  const allClients = Object.keys(d.clientes);

  // Sort by LTV desc for bar charts
  const sorted = [...allClients].sort((a,b) => metrics[b].ltv - metrics[a].ltv);
  const ltvVals = sorted.map(c => Math.round(metrics[c].ltv));
  const mrrVals = sorted.map(c => Math.round(metrics[c].mrr));
  const barColors = sorted.map((_,i) => CLIENT_COLORS[i % CLIENT_COLORS.length]);

  const hBarOpts = (cb) => ({
    indexAxis: 'y',
    responsive: true, maintainAspectRatio: false,
    plugins: { legend:{display:false}, tooltip:{ backgroundColor:'#1e1e1e', titleColor:'#f0f0f0', bodyColor:'#888', borderColor:'#333', borderWidth:0.5, padding:10 } },
    scales: {
      x: { ticks:{color:'#555',font:{size:11},callback:cb}, grid:{color:'rgba(255,255,255,.04)'}, border:{color:'#333'} },
      y: { ticks:{color:'#aaa',font:{size:11}}, grid:{display:false}, border:{color:'#333'} }
    }
  });

  // LTV bar (horizontal)
  mkChart('c-cli-ltv', {
    type: 'bar',
    data: { labels: sorted, datasets: [{ data: ltvVals, backgroundColor: barColors, borderRadius: 4 }] },
    options: hBarOpts(v => fmt(v))
  });

  // MRR bar (horizontal)
  mkChart('c-cli-mrr', {
    type: 'bar',
    data: { labels: sorted, datasets: [{ data: mrrVals, backgroundColor: barColors.map(c=>c+'bb'), borderRadius: 4 }] },
    options: hBarOpts(v => fmt(v))
  });

  // Churn rate line — labels son meses[1..n] (el churn entre mes i-1 e i)
  const churnLabels = d.meses.slice(1);
  mkChart('c-cli-churn', {
    type: 'line',
    data: { labels: churnLabels, datasets: [{
      label: 'Churn %', data: churnRates,
      borderColor: COLORS.coral, backgroundColor: 'rgba(216,90,48,.1)',

    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false}, tooltip:{ backgroundColor:'#1e1e1e', titleColor:'#f0f0f0', bodyColor:'#888', borderColor:'#333', borderWidth:0.5, padding:10, callbacks:{ label: ctx => ` Churn: ${ctx.raw}%` } } },
      scales: {
        x: { ticks:{color:'#555',font:{size:11},autoSkip:false}, grid:{display:false}, border:{color:'#333'} },
        y: { min:0, ticks:{color:'#555',font:{size:11},callback:v=>v+'%'}, grid:{color:'rgba(255,255,255,.04)'}, border:{color:'#333'} }
      }
    }
  });

  // Active clients per month
  const countPerMonth = d.meses.map((_,i) => allClients.filter(c => d.clientes[c][i]>0).length);
  mkChart('c-cli-count', {
    type: 'bar',
    data: { labels: d.meses, datasets: [{ data: countPerMonth, backgroundColor: COLORS.blue, borderRadius: 3 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false}, tooltip:{ backgroundColor:'#1e1e1e', titleColor:'#f0f0f0', bodyColor:'#888', borderColor:'#333', borderWidth:0.5, padding:10 } },
      scales: {
        x: { ticks:{color:'#555',font:{size:11},autoSkip:false}, grid:{display:false}, border:{color:'#333'} },
        y: { ticks:{stepSize:1,color:'#555',font:{size:11}}, grid:{color:'rgba(255,255,255,.04)'}, border:{color:'#333'} }
      }
    }
  });

  // Heatmap
  const heatDatasets = allClients.map((c,i) => ({
    label: c,
    data: d.meses.map((_,mi) => d.clientes[c][mi] > 0 ? 1 : 0),
    backgroundColor: CLIENT_COLORS[i % CLIENT_COLORS.length],
    borderRadius: 2,
    barThickness: 18,

  mkChart('c-cli-heatmap', {

// ─── SECTION: ACUMULADO TOTAL ──────────────────────────────────────────────
function buildAcumulado() {
  const years = [2024, 2025, 2026];

  // Merge all months across years with year prefix
  const allMeses    = years.flatMap(y => DATA[y].meses.map(m => m + ' ' + String(y).slice(2)));
  const allIngresos = years.flatMap(y => DATA[y].ingresos);
  const allCostos   = years.flatMap(y => DATA[y].costos);
  const allRes      = years.flatMap(y => DATA[y].resultado);
  const allMargen   = years.flatMap(y => DATA[y].margen);
  const allDivs     = years.flatMap(y => {
    const socios = Object.values(DATA[y].dividendos);
    return DATA[y].meses.map((_,i) => socios.reduce((a,s)=>a+(s[i]||0),0));
  });

  const totalIng  = sum(allIngresos);
  const totalCost = sum(allCostos);
  const totalRes  = sum(allRes);
  const totalDiv  = sum(allDivs);
  const avgMrg    = Math.round(allMargen.filter(v=>v>0).reduce((a,b)=>a+b,0) / allMargen.filter(v=>v>0).length);
  const totalMeses = allMeses.length;

  // Cumulative ingreso line
  let cumSum = 0;
  const cumIngresos = allIngresos.map(v => { cumSum += v; return cumSum; });

  // All clients ever across all years (deduplicated, sum revenue)
  const clientMap = {};
  years.forEach(y => {
    Object.entries(DATA[y].ingresoClientes).forEach(([c, v]) => {
      clientMap[c] = (clientMap[c] || 0) + v;
    });
  });
  const sortedClients = Object.entries(clientMap).sort((a,b)=>b[1]-a[1]);
  const totalCliRev   = Object.values(clientMap).reduce((a,b)=>a+b,0);

  // Dividends per socio across all years
  const divSocios = {};
  years.forEach(y => {
    Object.entries(DATA[y].dividendos).forEach(([s, arr]) => {
      divSocios[s] = (divSocios[s] || 0) + sum(arr);
    });
  });

  return `
    <div style="margin-bottom:6px">
      <p style="font-size:13px;color:var(--text2)">Suma de todos los períodos registrados — Jul 2024 a la fecha · ${totalMeses} meses</p>
    </div>

    <div class="kpi-row" style="margin-bottom:20px">
      <div class="kpi">
        <div class="kpi-label">Ingresos totales</div>
        <div class="kpi-val">${fmt(totalIng)}</div>
        <div class="kpi-sub">${totalMeses} meses</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Resultado neto</div>
        <div class="kpi-val">${fmt(totalRes)}</div>
        <div class="kpi-sub">Antes de dividendos</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Costos operativos</div>
        <div class="kpi-val">${fmt(totalCost)}</div>
        <div class="kpi-sub">${pct(Math.round(totalCost/totalIng*100))} de ingresos</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Margen promedio</div>
        <div class="kpi-val">${pct(avgMrg)}</div>
        <div class="kpi-sub">Neto operativo</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Dividendos totales</div>
        <div class="kpi-val">${fmt(totalDiv)}</div>
        <div class="kpi-sub">${Object.keys(divSocios).join(' + ')}</div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:14px">
      <div class="card">
        <div class="card-title">Ingresos mensuales — histórico completo</div>
        <div class="chart-wrap h220"><canvas id="c-acu-bar" role="img" aria-label="Ingresos históricos completos"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Ingresos acumulados — curva de crecimiento</div>
        <div class="chart-wrap h220"><canvas id="c-acu-cum" role="img" aria-label="Curva de ingresos acumulados"></canvas></div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:14px">
      <div class="card">
        <div class="card-title">Margen neto — histórico completo</div>
        <div class="chart-wrap h180"><canvas id="c-acu-mrg" role="img" aria-label="Margen histórico completo"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Resultado vs dividendos — histórico</div>
        <div class="chart-wrap h180"><canvas id="c-acu-div" role="img" aria-label="Resultado vs dividendos histórico"></canvas></div>
        <div class="legend">
          <span><span class="legend-dot" style="background:${COLORS.green}"></span>Resultado neto</span>
          <span><span class="legend-dot" style="background:${COLORS.amber}"></span>Dividendos</span>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Revenue total por cliente — todos los años</div>
        <div class="chart-wrap h${Math.max(200, sortedClients.length * 30)}"><canvas id="c-acu-cli" role="img" aria-label="Revenue total por cliente histórico"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Dividendos acumulados por socio</div>
        <div style="display:flex;align-items:center;gap:16px;margin-top:8px">
          <div style="position:relative;width:140px;height:140px;flex-shrink:0;">
            <canvas id="c-acu-div-donut" role="img" aria-label="Dividendos por socio"></canvas>
          </div>
          <div>
            ${Object.entries(divSocios).map(([s,v],i)=>`
              <div style="margin-bottom:12px">
                <div style="font-size:12px;color:var(--text2)">${s}</div>
                <div style="font-size:20px;font-weight:600;color:var(--text)">${fmt(v)}</div>
                <div style="font-size:11px;color:var(--text3)">${pct(Math.round(v/totalDiv*100))} del total</div>
              </div>`).join('')}
            <div style="border-top:0.5px solid var(--border);padding-top:10px;margin-top:4px">
              <div style="font-size:11px;color:var(--text3)">Tasa de distribución</div>
              <div style="font-size:16px;font-weight:600;color:var(--amber)">${pct(Math.round(totalDiv/totalRes*100))}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderAcumuladoCharts() {
  const years = [2024, 2025, 2026];
  const allMeses    = years.flatMap(y => DATA[y].meses.map(m => m + "'" + String(y).slice(2)));
  const allIngresos = years.flatMap(y => DATA[y].ingresos);
  const allCostos   = years.flatMap(y => DATA[y].costos);
  const allRes      = years.flatMap(y => DATA[y].resultado);
  const allMargen   = years.flatMap(y => DATA[y].margen);
  const allDivs     = years.flatMap(y => {
    const socios = Object.values(DATA[y].dividendos);
    return DATA[y].meses.map((_,i) => socios.reduce((a,s)=>a+(s[i]||0),0));
  });

  // Color bands per year
  const yearColors = { 2024: COLORS.gray, 2025: COLORS.blue, 2026: COLORS.green };
  const barColors  = years.flatMap(y => DATA[y].meses.map(() => yearColors[y]));

  // Cumulative
  let cum = 0;
  const cumLine = allIngresos.map(v => { cum += v; return cum; });

  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend:{display:false}, tooltip:{ backgroundColor:'#1e1e1e', titleColor:'#f0f0f0', bodyColor:'#888', borderColor:'#333', borderWidth:0.5, padding:10 } },
  };

  // Ingresos histórico bar
  mkChart('c-acu-bar', {
    type: 'bar',
    data: { labels: allMeses, datasets: [{ data: allIngresos, backgroundColor: barColors, borderRadius: 2 }] },
    options: { ...baseOpts, scales: {
      x: { ticks:{color:'#555',font:{size:9},maxRotation:60,autoSkip:true,maxTicksLimit:24}, grid:{display:false}, border:{color:'#333'} },
      y: { ticks:{color:'#555',font:{size:11},callback:v=>fmt(v)}, grid:{color:'rgba(255,255,255,.04)'}, border:{color:'#333'} }
    }}
  });

  // Cumulative line
  mkChart('c-acu-cum', {
    type: 'line',
    data: { labels: allMeses, datasets: [{ data: cumLine, borderColor: COLORS.green, backgroundColor:'rgba(29,158,117,.08)', fill:true, tension:.4, pointRadius:2, pointBackgroundColor: COLORS.green }] },
    options: { ...baseOpts, scales: {
      x: { ticks:{color:'#555',font:{size:9},maxRotation:60,autoSkip:true,maxTicksLimit:24}, grid:{display:false}, border:{color:'#333'} },
      y: { ticks:{color:'#555',font:{size:11},callback:v=>fmt(v)}, grid:{color:'rgba(255,255,255,.04)'}, border:{color:'#333'} }
    }}
  });

  // Margen histórico
  mkChart('c-acu-mrg', {
    type: 'line',
    data: { labels: allMeses, datasets: [{ data: allMargen, borderColor: COLORS.purple, backgroundColor:'rgba(127,119,221,.08)', fill:true, tension:.35, pointRadius:2, pointBackgroundColor: COLORS.purple }] },
    options: { ...baseOpts, scales: {
      x: { ticks:{color:'#555',font:{size:9},maxRotation:60,autoSkip:true,maxTicksLimit:24}, grid:{display:false}, border:{color:'#333'} },
      y: { min:0, max:100, ticks:{color:'#555',font:{size:11},callback:v=>v+'%'}, grid:{color:'rgba(255,255,255,.04)'}, border:{color:'#333'} }
    }}
  });

  // Resultado vs dividendos
  mkChart('c-acu-div', {
    type: 'bar',
    data: { labels: allMeses, datasets: [
      { label:'Resultado', data: allRes, backgroundColor: COLORS.green+'55', borderRadius:2 },
      { label:'Dividendos', data: allDivs, type:'line', borderColor: COLORS.amber, backgroundColor:'transparent', tension:.35, pointRadius:2, pointBackgroundColor: COLORS.amber }
    ]},
    options: { ...baseOpts, scales: {
      x: { ticks:{color:'#555',font:{size:9},maxRotation:60,autoSkip:true,maxTicksLimit:24}, grid:{display:false}, border:{color:'#333'} },
      y: { ticks:{color:'#555',font:{size:11},callback:v=>fmt(v)}, grid:{color:'rgba(255,255,255,.04)'}, border:{color:'#333'} }
    }}
  });

  // Revenue por cliente (horizontal)
  const clientMap = {};
  years.forEach(y => {
    Object.entries(DATA[y].ingresoClientes).forEach(([c,v]) => { clientMap[c]=(clientMap[c]||0)+v; });
  });
  const sorted = Object.entries(clientMap).sort((a,b)=>b[1]-a[1]);
  mkChart('c-acu-cli', {
    type: 'bar',
    data: { labels: sorted.map(e=>e[0]), datasets:[{ data: sorted.map(e=>Math.round(e[1])), backgroundColor: CLIENT_COLORS.slice(0,sorted.length), borderRadius:4 }] },
    options: { indexAxis:'y', ...baseOpts, scales: {
      x: { ticks:{color:'#555',font:{size:11},callback:v=>fmt(v)}, grid:{color:'rgba(255,255,255,.04)'}, border:{color:'#333'} },
      y: { ticks:{color:'#aaa',font:{size:11}}, grid:{display:false}, border:{color:'#333'} }
    }}
  });

  // Dividendos donut
  const divSocios = {};
  years.forEach(y => { Object.entries(DATA[y].dividendos).forEach(([s,arr])=>{ divSocios[s]=(divSocios[s]||0)+sum(arr); }); });
  const divLabels = Object.keys(divSocios);
  const divVals   = Object.values(divSocios);
  mkChart('c-acu-div-donut', {
    type: 'doughnut',
    data: { labels: divLabels, datasets:[{ data: divVals, backgroundColor:[COLORS.amber, COLORS.pink], borderWidth:0 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, cutout:'65%' }
  });
}

function showSection(name) {
  currentSection = name;
  document.querySelectorAll('.snav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.snav-btn[onclick="showSection('${name}')"]`).classList.add('active');

  // Year tabs: hide on interanual and acumulado
  document.getElementById('yearTabs').style.display = (name === 'interanual' || name === 'acumulado') ? 'none' : 'flex';

  render();
}

function setYear(y) {
  currentYear = y;
  [2024,2025,2026].forEach(yr => {
    document.getElementById('tab'+yr).classList.toggle('active', yr===y);
  });
  render();
}

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  await fetchSheetData();
  render();
}

init();
</script>
</body>
</html>
